name = "ai-trading-scanner"
main = "./custom-worker.ts"
compatibility_date = "2026-06-16"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]
workers_dev = true # deploy trigger 2026-06-17

# Custom domains are NOT declared here — attach in dashboard:
# Workers & Pages → ai-trading-scanner → Settings → Domains & Routes → Add custom domain.
# See docs/CLOUDFLARE_DEPLOY.md

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[[services]]
binding = "WORKER_SELF_REFERENCE"
service = "ai-trading-scanner"

# OpenNext incremental cache (SSR/page cache) — required for production deploys.
[[r2_buckets]]
binding = "NEXT_INC_CACHE_R2_BUCKET"
bucket_name = "ai-trading-scanner-opennext-cache"

# Scan snapshot bucket (app reads/writes via S3 API + R2_* secrets).
[[r2_buckets]]
binding = "SCAN_CACHE_R2_BUCKET"
bucket_name = "ai-trading-scanner"

[triggers]
crons = [
  "0 0 * * *",
  "5 0 * * *",
  "10 0 * * *",
  "15 0 * * *",
]

# Paid Workers: extend CPU for long scan API routes (up to 300s). Free tier: ~30s HTTP limit.
# [limits]
# cpu_ms = 300000

[observability]
enabled = true
head_sampling_rate = 1

# Public runtime vars — CI injects before deploy (see deploy-cloudflare.yml).
[vars]
NEXT_PUBLIC_NEWS_POLL_MS = "120000"
NEXT_PUBLIC_QUOTES_POLL_MS_MARKET = "60000"
NEXT_PUBLIC_QUOTES_POLL_MS_OFF = "180000"
NEXT_PUBLIC_NEWS_POLL_MS_MARKET = "120000"
NEXT_PUBLIC_NEWS_POLL_MS_OFF = "120000"
SCAN_RUNTIME = "cloudflare"
YAHOO_QUOTE_CACHE_TTL_MS = "900000"
YAHOO_NEWS_CACHE_TTL_MS = "120000"
YAHOO_CHART_CACHE_TTL_MS = "900000"
YAHOO_QUOTE_BATCH_SIZE = "80"
